        price: 150
      - name: Wizyty patronażowe (NFZ)
        price: 0
        nfz: true
      - name: Prowadzenie ciąży fizjologicznej (NFZ)
        price: 0
        nfz: true
      - name: Szkoła Rodzenia
        price: 0
        nfz: true

  - nazwa: Fizjoterapia
    pozycje:
      - name: Konsultacja fizjoterapeutyczna
